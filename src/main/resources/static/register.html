<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EventFlow - Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
            font-family:'DM Sans',sans-serif;
        }

        .register-card{
            border:none;
            border-radius:24px;
            padding:40px;
            box-shadow:0 10px 40px rgba(0,0,0,0.08);
        }

        .brand{
            font-family:'Syne',sans-serif;
            font-weight:800;
            font-size:32px;
        }

        .brand span{
            color:#0d6efd;
        }

        .main-title{
            font-family:'Syne',sans-serif;
            font-weight:800;
            font-size:38px;
        }

        .form-control,
        .form-select{
            height:55px;
            border-radius:14px;
        }

        .btn-register{
            height:55px;
            border-radius:14px;
            font-weight:600;
            font-size:18px;
        }

    </style>

</head>

<body>

<!-- ---------------NAVBAR--------------- -->

<nav class="navbar navbar-expand-lg bg-white border-bottom py-3">

    <div class="container">

        <a class="navbar-brand brand" href="#">
            Event<span>Flow</span>
        </a>

        <a href="login.html"
           class="btn btn-outline-primary rounded-pill px-4">
            Login
        </a>

    </div>

</nav>

<!-- -------------------REGISTER SECTION------------------- -->

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card register-card">

                <div class="text-center mb-4">

                    <h1 class="main-title">
                        Create Account 
                    </h1>

                    <p class="text-secondary">
                        Join EventFlow and start your journey
                    </p>

                </div>

                <!-- Name -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Full Name
                    </label>

                    <input type="text"
                           id="name"
                           class="form-control"
                           placeholder="Enter your name">

                </div>

                <!-- Email -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Email Address
                    </label>

                    <input type="email"
                           id="email"
                           class="form-control"
                           placeholder="Enter your email">

                </div>

                <!-- Password -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Password
                    </label>

                    <input type="password"
                           id="password"
                           class="form-control"
                           placeholder="Enter your password">

                </div>

                <!-- Role -->

                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Select Role
                    </label>

                    <select id="role"
                            class="form-select">

                        <option value="USER">
                             USER
                        </option>

                        <option value="ORGANIZER">
                             ORGANIZER
                        </option>

                    </select>

                </div>

                <!-- Button -->

                <button class="btn btn-primary w-100 btn-register"
                        onclick="registerUser()">

                    Create Account

                </button>

                <p class="text-center text-secondary mt-4 mb-0">

                    Already have an account?

                    <a href="login.html"
                       class="text-decoration-none fw-semibold">
                        Login
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

<script>

async function registerUser() {

    const user = {

        name: document.getElementById("name").value,

        email: document.getElementById("email").value,

        password: document.getElementById("password").value,

        role: document.getElementById("role").value
    };

    const response = await fetch(

        "http://localhost:8080/api/users/register",

        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(user)
        }
    );

    if(response.ok) {

        alert("Registration Successful");

        window.location.href = "login.html";

    } else {

        alert("Registration Failed");
    }
}

</script>

</body>
</html>
