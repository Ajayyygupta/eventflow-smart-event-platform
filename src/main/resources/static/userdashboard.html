<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Explore Events</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="/css/userdashboard.css">

</head>

<body>

<!-- MOBILE BTN -->

<button class="mobile-menu-btn"
        onclick="toggleSidebar()">

☰

</button>

<div class="overlay"
     id="overlay"
     onclick="toggleSidebar()">

</div>

<!-- SIDEBAR -->

<div class="sidebar">

<div>

<h2 class="logo">

🎉 EventFlow

</h2>

<ul class="menu">

<li onclick="scrollToSection('dashboardSection')">

Dashboard

</li>

<li onclick="scrollToSection('eventsSection')">

Explore Events

</li>

<li onclick="scrollToSection('bookingsSection')">

My Bookings

</li>

</ul>

</div>

<button class="logout-btn"
        onclick="logout()">

Logout

</button>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<div>

<h1>

Explore Events

</h1>

<p id="welcomeText">

Welcome 👋

</p>

</div>

</div>

<!-- STATS -->

<div class="stats-grid"
     id="dashboardSection">

<div class="card stat-card">

<h3 id="totalEvents">

0

</h3>

<p>

Available Events

</p>

</div>

<div class="card stat-card">

<h3 id="myBookings">

0

</h3>

<p>

My Bookings

</p>

</div>

<div class="card stat-card">

<h3 id="upcomingEvents">

0

</h3>

<p>

Upcoming Events

</p>

</div>

</div>

<!-- SEARCH -->

<div class="card mt-4 p-4">

<input type="text"
       class="form-control"
       placeholder="Search Events..."
       onkeyup="searchEvent(this.value)">

</div>

<!-- EVENTS -->

<div class="mt-4"
     id="eventsSection">

<h2 class="mb-4">

Explore Events

</h2>

<div class="row"
     id="eventContainer">

</div>

</div>

<!-- BOOKINGS -->

<div class="card mt-5"
     id="bookingsSection">

<div class="p-4">

<h3 class="mb-4">

My Bookings

</h3>

<table class="table">

<thead>

<tr>

<th>ID</th>
<th>Event</th>
<th>Time</th>
<th>Action</th>

</tr>

</thead>

<tbody id="bookingTableBody">

</tbody>

</table>

</div>

</div>

</div>

<script src="/js/userdashboard.js"></script>

<script>

function scrollToSection(id){

    document
        .getElementById(id)
        .scrollIntoView({
            behavior:"smooth"
        });
}

function toggleSidebar(){

    document
        .querySelector(".sidebar")
        .classList.toggle("active");

    document
        .getElementById("overlay")
        .classList.toggle("show");
}

</script>

</body>
</html>
