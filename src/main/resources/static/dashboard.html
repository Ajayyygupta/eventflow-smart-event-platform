<!DOCTYPE html>
<html lang="en">

<head>  

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Event Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fb;
        }

        /* =========================
           HEADER
        ========================= */

        .topbar{
            background:white;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
            position:sticky;
            top:0;
            z-index:100;
        }

        .topbar h1{
            color:#0d6efd;
            font-size:30px;
            font-weight:700;
        }

        .logout-btn{
            border:none;
            background:#dc3545;
            color:white;
            padding:10px 20px;
            border-radius:10px;
            font-weight:600;
            transition:0.3s;
        }

        .logout-btn:hover{
            background:#bb2d3b;
            transform:translateY(-2px);
        }

        /* =========================
           SECTION TITLE
        ========================= */

        .section-title{
            font-size:28px;
            font-weight:700;
            margin-bottom:20px;
            color:#222;
        }

        /* =========================
           EVENT CARD
        ========================= */

        .event-card{
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 6px 20px rgba(0,0,0,0.08);
            transition:0.3s;
            height:100%;
        }

        .event-card:hover{
            transform:translateY(-5px);
        }

        /* Event Image */
        .event-image{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .event-content{
            padding:25px;
        }

        .event-title{
            font-size:24px;
            font-weight:700;
            color:#0d6efd;
        }

        .event-desc{
            color:#555;
            margin-top:10px;
            min-height:60px;
        }

        .event-info{
            margin-top:12px;
            color:#444;
            font-size:15px;
        }

        .capacity{
            font-weight:600;
            color:#198754;
        }

        /* =========================
           BUTTONS
        ========================= */

        .book-btn{
            width:100%;
            margin-top:20px;
            border:none;
            padding:12px;
            border-radius:12px;
            background:#0d6efd;
            color:white;
            font-weight:600;
            transition:0.3s;
        }

        .book-btn:hover{
            background:#0b5ed7;
        }

        /* Already Booked */
        .booked-btn{
            background:#198754 !important;
            cursor:not-allowed;
        }

        /* Sold Out */
        .soldout-btn{
            background:#6c757d !important;
            cursor:not-allowed;
        }

        /* =========================
           BOOKING CARD
        ========================= */

        .booking-card{
            background:white;
            padding:20px;
            border-radius:15px;
            margin-bottom:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.06);
        }

        .booking-card h5{
            color:#0d6efd;
            font-weight:700;
        }

        .booking-card p{
            margin:0;
            color:#555;
        }

        /* =========================
           RESPONSIVE
        ========================= */

        @media(max-width:768px){

            .topbar{
                padding:20px;
            }

            .topbar h1{
                font-size:22px;
            }

            .section-title{
                font-size:22px;
            }
        }

    </style>

</head>

<body>
    

<!-- =========================
     HEADER
========================= -->

<div class="topbar">

    <h1>🎉 Event Dashboard</h1>

    <button class="logout-btn"
            onclick="logout()">

        Logout

    </button>

</div>

<div class="container py-5">

    <!-- EVENTS -->
    <h2 class="section-title">
        Available Events
    </h2>

    <div id="eventsContainer"
         class="row g-4">

    </div>

    <!-- BOOKINGS -->
    <div class="mt-5">

        <h2 class="section-title">
            My Bookings
        </h2>

        <div id="bookingContainer">

        </div>

    </div>

</div>

<script src="/js/dashboard.js"></script>
</body>
</html>
