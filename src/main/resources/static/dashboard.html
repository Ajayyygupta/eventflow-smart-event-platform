<!DOCTYPE html>
<html lang="en">

<head>  

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Event Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Vibrant Dark Theme Gradients */
            --primary-gradient: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            --accent-gradient: linear-gradient(135deg, #EC4899 0%, #8B5CF6 100%);
            /* Premium Dark Mesh Background */
            --bg-light-mesh: radial-gradient(at 0% 0%, rgba(17, 24, 39, 1) 0, transparent 50%), radial-gradient(at 50% 0%, rgba(31, 41, 55, 0.5) 0, transparent 50%), #0B0F19;
            --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5), 0 1px 3px 0 rgba(0, 0, 0, 0.3);
            --hover-shadow: 0 20px 40px -5px rgba(99, 102, 241, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Smooth Scroll Configuration */
        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-light-mesh);
            color: #E5E7EB;
            min-height: 100vh;
        }

        /* =========================
           HEADER (PREMIUM TOPBAR)
        ========================= */
        .topbar {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: rgba(11, 15, 25, 0.75) !important;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
            position: sticky;
            top: 0;
            z-index: 1050;
        }

        .topbar h1 {
            font-family: 'Syne', sans-serif;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.01em;
        }

        .logout-btn {
            border: 1px solid rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.1);
            color: #EF4444;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logout-btn:hover {
            background: #EF4444;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        /* =========================
           SECTION TITLE
        ========================= */
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 25px;
            color: #FFFFFF;
            letter-spacing: -0.01em;
        }

        /* =========================
           EVENT CARD (GLASSMORPHIC INJECTION)
        ========================= */
        .event-card {
            background: rgba(31, 41, 55, 0.4) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--card-shadow) !important;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            height: 100%;
        }

        .event-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--hover-shadow) !important;
            border-color: rgba(99, 102, 241, 0.35) !important;
            background: rgba(31, 41, 55, 0.55) !important;
        }

        /* Event Image Enhancements */
        .event-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.5s ease;
        }
        
        .event-card:hover .event-image {
            transform: scale(1.02);
        }

        .event-content {
            padding: 25px;
        }

        .event-title {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .event-desc {
            color: #9CA3AF;
            margin-top: 10px;
            min-height: 60px;
            line-height: 1.6;
        }

        .event-info {
            margin-top: 15px;
            color: #D1D5DB;
            font-size: 15px;
        }

        .capacity {
            font-weight: 700;
            color: #10B981 !important; /* Premium Emerald Accent */
        }

        /* =========================
           BUTTONS DYNAMICS
        ========================= */
        .book-btn {
            width: 100%;
            margin-top: 20px;
            border: none;
            padding: 12px;
            border-radius: 12px;
            background: var(--primary-gradient);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .book-btn:hover:not(.booked-btn):not(.soldout-btn) {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        /* Already Booked Status Overlay */
        .booked-btn {
            background: linear-gradient(135deg, #059669 0%, #10B981 100%) !important;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2) !important;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Sold Out Status Overlay */
        .soldout-btn {
            background: rgba(75, 85, 99, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            color: #9CA3AF !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
        }

        /* =========================
           BOOKING CARD PANEL
        ========================= */
        .booking-card {
            background: rgba(31, 41, 55, 0.4) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            padding: 22px;
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: var(--card-shadow) !important;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .booking-card:hover {
            transform: translateX(4px);
            border-color: rgba(168, 85, 247, 0.3) !important;
            background: rgba(31, 41, 55, 0.5) !important;
        }

        .booking-card h5 {
            font-family: 'Syne', sans-serif;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .booking-card p {
            margin: 0;
            color: #9CA3AF;
        }

        /* Custom Premium Cyberpunk Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0B0F19;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(#6366F1, #A855F7);
            border-radius: 20px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(#A855F7, #EC4899);
        }

        /* =========================
           RESPONSIVE RE-OPTIMIZATION
        ========================= */
        @media(max-width:768px){
            .topbar {
                padding: 15px 20px;
            }

            .topbar h1 {
                font-size: 22px;
            }

            .section-title {
                font-size: 22px;
                margin-bottom: 15px;
            }
        }
    </style>

</head>

<body>
    

<div class="topbar">
    <h1>🎉 Event Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container py-5">

    <h2 class="section-title">Available Events</h2>
    <div id="eventsContainer" class="row g-4">
        </div>

    <div class="mt-5">
        <h2 class="section-title">My Bookings</h2>
        <div id="bookingContainer">
            </div>
    </div>

</div>

<script src="/js/dashboard.js"></script>
</body>
</html>
