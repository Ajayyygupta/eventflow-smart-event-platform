<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="/css/admin.css">

</head>

<body>

<div class="sidebar">

    <h2>⚡ Admin</h2>

    <ul>

        <li>Dashboard</li>
        <li onclick="showSection('eventsSection')">

        Events

        </li>

        <li onclick="showSection('usersSection')">

         Users

        </li>

        <li onclick="showSection('bookingsSection')">

    Bookings

        </li>

        <li onclick="logout()">
            Logout
        </li>

    </ul>

</div>

<div class="main-content">

    <h1 class="mb-4">
        Admin Dashboard
    </h1>

    <!-- STATS -->

    <div class="row g-4 mb-5">

        <div class="col-md-4">

            <div class="stats-card">

                <h3 id="totalUsers">
                    0
                </h3>

                <p>Total Users</p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stats-card">

                <h3 id="totalEvents">
                    0
                </h3>

                <p>Total Events</p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stats-card">

                <h3 id="totalBookings">
                    0
                </h3>

                <p>Total Bookings</p>

            </div>

        </div>

    </div>

    <!-- EVENTS TABLE -->

    <div class="table-card">

        <div class="d-flex
                    justify-content-between
                    align-items-center
                    mb-3">

            <h3>Events</h3>

            <button class="btn btn-primary">

                Add Event

            </button>

        </div>

        <table class="table">

            <thead>

            <tr>

                <th>ID</th>

                <th>Title</th>

                <th>Location</th>

                <th>Capacity</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody id="eventTableBody">

            </tbody>

        </table>

    </div>

    <!-- USERS TABLE -->

    <div class="table-card mt-5">

        <h3 class="mb-3">
            Users
        </h3>

        <table class="table">

            <thead>

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Email</th>

                <th>Role</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody id="userTableBody">

            </tbody>

        </table>

    </div>

    <!-- BOOKINGS TABLE -->

    <div class="table-card mt-5">

        <h3 class="mb-3">
            Bookings
        </h3>

        <table class="table">

            <thead>

            <tr>

                <th>ID</th>

                <th>User</th>

                <th>Event</th>

                <th>Time</th>

                <th>Action</th>


            </tr>

            </thead>

            <tbody id="bookingTableBody">

            </tbody>

        </table>

    </div>

</div>

<script src="/js/admin.js"></script>

</body>
</html>
