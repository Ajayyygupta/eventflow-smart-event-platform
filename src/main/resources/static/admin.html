<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="/css/admin.css">

</head>

<body>
    
<div class="sidebar">

<input type="text"
       class="form-control mb-3"
       placeholder="Search events..."
       onkeyup="searchEvent(this.value)">


    <h2>⚡ Admin</h2>

    <ul>

        <li>Dashboard</li>
        <li onclick="showSection('eventsSection')">

        Events

        </li>

        <li onclick="showSection('usersSection')">

         Users

        </li>

        <li onclick="showSection('bookingsSection')">

    Bookings

        </li>

        <li onclick="logout()">
            Logout
        </li>

    </ul>

</div>

<div class="main-content">

    <h1 class="mb-4">
        Admin Dashboard
    </h1>

    <!-- STATS -->

    <div class="row g-4 mb-5">

        <div class="col-md-4">

            <div class="stats-card">

                <h3 id="totalUsers">
                    0
                </h3>

                <p>Total Users</p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stats-card">

                <h3 id="totalEvents">
                    0
                </h3>

                <p>Total Events</p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stats-card">

                <h3 id="totalBookings">
                    0
                </h3>

                <p>Total Bookings</p>

            </div>

        </div>

    </div>

    <!-- EVENTS TABLE -->

    <div class="table-card">

        <div class="d-flex
                    justify-content-between
                    align-items-center
                    mb-3">

            <h3>Events</h3>

           <button class="btn btn-primary"
           data-bs-toggle="modal"
           data-bs-target="#eventModal">

           Add Event

           </button>
        </div>

        <table class="table">

            <thead>

            <tr>

                <th>ID</th>

                <th>Title</th>

                <th>Location</th>

                <th>Capacity</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody id="eventTableBody">

            </tbody>

        </table>

    </div>

    <!-- USERS TABLE -->

    <div class="table-card mt-5">

        <h3 class="mb-3">
            Users
        </h3>

        <table class="table">

            <thead>

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Email</th>

                <th>Role</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody id="userTableBody">

            </tbody>

        </table>

    </div>

    <!-- BOOKINGS TABLE -->

    <div class="table-card mt-5">

        <h3 class="mb-3">
            Bookings
        </h3>

        <table class="table">

            <thead>

            <tr>

                <th>ID</th>

                <th>User</th>

                <th>Event</th>

                <th>Time</th>

                <th>Action</th>


            </tr>

            </thead>

            <tbody id="bookingTableBody">

            </tbody>

        </table>

    </div>

</div>

<script src="/js/admin.js"></script>

<!-- ADD EVENT MODAL -->

<div class="modal fade"
     id="eventModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Create Event
                </h5>

                <button class="btn-close"
                        data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <input type="text"
                       id="title"
                       class="form-control mb-3"
                       placeholder="Event Title">

                <input type="text"
                       id="location"
                       class="form-control mb-3"
                       placeholder="Location">

                <input type="date"
                       id="date"
                       class="form-control mb-3">

                <input type="number"
                       id="capacity"
                       class="form-control mb-3"
                       placeholder="Capacity">

                <textarea id="description"
                          class="form-control mb-3"
                          placeholder="Description">

                </textarea>

                <button class="btn btn-primary w-100"
                        onclick="addEvent()">

                    Create Event

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
