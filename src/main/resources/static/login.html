<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EventFlow - Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
            font-family:'DM Sans',sans-serif;
        }

        .login-card{
            border:none;
            border-radius:24px;
            padding:40px;
            box-shadow:0 10px 40px rgba(0,0,0,0.08);
        }

        .brand{
            font-family:'Syne',sans-serif;
            font-weight:800;
            font-size:32px;
        }

        .brand span{
            color:#0d6efd;
        }

        .main-title{
            font-family:'Syne',sans-serif;
            font-weight:800;
            font-size:38px;
        }

        .form-control{
            height:55px;
            border-radius:14px;
        }

        .btn-login{
            height:55px;
            border-radius:14px;
            font-size:18px;
            font-weight:600;
        }

    </style>

</head>

<body>

    <button class="mobile-menu-btn"
        onclick="toggleSidebar()">

    ☰

</button>

<div class="overlay"
     id="overlay"
     onclick="toggleSidebar()">

</div>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg bg-white border-bottom py-3">

    <div class="container">

        <a class="navbar-brand brand" href="#">
            Event<span>Flow</span>
        </a>

        <a href="register.html"
           class="btn btn-outline-primary rounded-pill px-4">
            Register
        </a>

    </div>

</nav>

<!-- ================= LOGIN SECTION ================= -->

<div class="container py-5">

    <div class="row justify-content-center align-items-center"
         style="min-height:80vh;">

        <div class="col-lg-5">

            <div class="card login-card">

                <div class="text-center mb-4">

                    <h1 class="main-title">
                        Welcome Back 👋
                    </h1>

                    <p class="text-secondary">
                        Login to your EventFlow account
                    </p>

                </div>

                <!-- Email -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Email Address
                    </label>

                    <input type="email"
                           id="email"
                           class="form-control"
                           placeholder="Enter your email">

                </div>

                <!-- Password -->

                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Password
                    </label>

                    <input type="password"
                           id="password"
                           class="form-control"
                           placeholder="Enter your password">

                </div>

                <!-- Button -->

                <button class="btn btn-primary w-100 btn-login"
                        onclick="loginUser()">

                    Sign In

                </button>

                <p class="text-center text-secondary mt-4 mb-0">

                    Don't have an account?

                    <a href="register.html"
                       class="text-decoration-none fw-semibold">
                        Register
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

<script>

async function loginUser() {

    const loginData = {

        email: document.getElementById("email").value,

        password: document.getElementById("password").value
    };

    const response = await fetch(

        "http://localhost:8080/api/users/login",

        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(loginData)
        }
    );

    const token = await response.text();

    if(response.ok) {

        //save token 
        localStorage.setItem("token", token); //trim is important

        
 
       //user email save
        localStorage.setItem("userEmail",loginData.email);

        alert("Login Successful 🔥");

        window.location.href = "dashboard.html";

    } else {

        alert("Invalid Credentials");
    }
}

</script>

</body>
</html>
