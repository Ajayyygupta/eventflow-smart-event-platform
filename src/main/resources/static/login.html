<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EventFlow - Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
            font-family:'DM Sans',sans-serif;
        }

        .login-card{
            border:none;
            border-radius:24px;
            padding:40px;
            box-shadow:0 10px 40px rgba(0,0,0,0.08);
        }

        .brand{
            font-family:'Syne',sans-serif;
            font-weight:800;
            font-size:32px;
        }

        .brand span{
            color:#0d6efd;
        }

        .main-title{
            font-family:'Syne',sans-serif;
            font-weight:800;
            font-size:38px;
        }

        .form-control{
            height:55px;
            border-radius:14px;
        }

        .btn-login{
            height:55px;
            border-radius:14px;
            font-size:18px;
            font-weight:600;
        }

        .role-options{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:10px;
            margin-bottom:20px;
        }

        .role-option{
            position:relative;
        }

        .role-option input{
            position:absolute;
            opacity:0;
            pointer-events:none;
        }

        .role-card{
            border:2px solid #e9ecef;
            border-radius:14px;
            padding:14px 8px;
            text-align:center;
            cursor:pointer;
            transition:all 0.2s ease;
            background:#fff;
            height:100%;
        }

        .role-card:hover{
            border-color:#0d6efd;
            background:#f8fbff;
        }

        .role-option input:checked + .role-card{
            border-color:#0d6efd;
            background:#eef5ff;
            box-shadow:0 0 0 3px rgba(13,110,253,0.15);
        }

        .role-icon{
            font-size:24px;
            display:block;
            margin-bottom:6px;
        }

        .role-label{
            font-size:13px;
            font-weight:600;
            color:#212529;
        }

    </style>

</head>

<body>

    <!-- <button class="mobile-menu-btn"
        onclick="toggleSidebar()">

    ☰

</button> -->
<!-- 
<div class="overlay"
     id="overlay"
     onclick="toggleSidebar()">

</div> -->

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg bg-white border-bottom py-3">

    <div class="container">

        <a class="navbar-brand brand" href="#">
            Event<span>Flow</span>
        </a>

        <a href="register.html"
           class="btn btn-outline-primary rounded-pill px-4">
            Register
        </a>

    </div>

</nav>

<!-- ================= LOGIN SECTION ================= -->

<div class="container py-5">

    <div class="row justify-content-center align-items-center"
         style="min-height:80vh;">

        <div class="col-lg-5">

            <div class="card login-card">

                <div class="text-center mb-4">

                    <h1 class="main-title">
                        Welcome Back 👋
                    </h1>

                    <p class="text-secondary">
                        Login to your EventFlow account
                    </p>

                </div>

                <!-- Login As -->

                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Login As
                    </label>

                    <div class="role-options">

                        <label class="role-option">
                            <input type="radio"
                                   name="loginRole"
                                   id="roleUser"
                                   value="USER"
                                   checked>
                            <div class="role-card">
                                <span class="role-icon">👤</span>
                                <span class="role-label">User</span>
                            </div>
                        </label>

                        <label class="role-option">
                            <input type="radio"
                                   name="loginRole"
                                   id="roleOrganizer"
                                   value="ORGANIZER">
                            <div class="role-card">
                                <span class="role-icon">🎯</span>
                                <span class="role-label">Organizer</span>
                            </div>
                        </label>

                        <label class="role-option">
                            <input type="radio"
                                   name="loginRole"
                                   id="roleAdmin"
                                   value="ADMIN">
                            <div class="role-card">
                                <span class="role-icon">🛡️</span>
                                <span class="role-label">Admin</span>
                            </div>
                        </label>

                    </div>

                </div>

                <!-- Email -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Email Address
                    </label>

                    <input type="email"
                           id="email"
                           class="form-control"
                           placeholder="Enter your email">

                </div>

                <!-- Password -->

                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Password
                    </label>

                    <input type="password"
                           id="password"
                           class="form-control"
                           placeholder="Enter your password">

                </div>

                <!-- Button -->

                <button class="btn btn-primary w-100 btn-login"
                        onclick="login()">

                    Sign In

                </button>

                <p class="text-center text-secondary mt-4 mb-0">

                    Don't have an account?

                    <a href="register.html"
                       class="text-decoration-none fw-semibold">
                        Register
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

<script src="/js/login.js"></script>

</body>
</html>
